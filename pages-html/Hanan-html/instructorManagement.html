 <!DOCTYPE html>
<html>
<head>
    <title>Instructor Course Management</title>
    <link rel="stylesheet" href="../../css/00-admin%20page.css">
</head>



<body>

    <h1>Instructor: Course Management</h1>

    <ul>
        <li><a href="#create">Create Course</a></li>
        <li><a href="#edit">Edit Course</a></li>
    </ul>

    <hr>

    <!-- CREATE COURSE -->
    <h2 id="create">Create a Course</h2>

    <form>
        <label>Course Code:</label><br>
        <input type="text" required><br><br>

        <label>Course Name:</label><br>
        <input type="text" required><br><br>

        <label>Instructor Name:</label><br>
        <input type="text" required><br><br>

        <label>Term:</label><br>
        <input type="text" required><br><br>

        <label>Assessment Categories:</label><br>
        <input type="checkbox"> Assignments<br>
        <input type="checkbox"> Labs<br>
        <input type="checkbox"> Quizzes<br>
        <input type="checkbox"> Exams<br><br>

        <input type="submit" value="Create Course">
    </form>

    <hr>

    <!-- EDIT COURSE -->
    <h2 id="edit">Edit a Course</h2>

    <form>
        <label>Enter Course Code to Edit:</label><br>
        <input type="text" required><br><br>

        <label>New Course Name:</label><br>
        <input type="text"><br><br>

        <label>New Instructor Name:</label><br>
        <input type="text"><br><br>

        <label>New Term:</label><br>
        <input type="text"><br><br>

        <label>Update Assessment Categories:</label><br>
        <input type="checkbox"> Assignments<br>
        <input type="checkbox"> Labs<br>
        <input type="checkbox"> Quizzes<br>
        <input type="checkbox"> Exams<br><br>

        <input type="submit" value="Save Changes">
    </form>

</body>

</html>
