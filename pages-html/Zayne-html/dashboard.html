        <!-- Course name could be implement later -->
         <div class="course_body">
    

         </div>

         <!-- Slide Bar -->
        <section class="edit_panel" id="edit_panel"> <!-- id for later use in js -->
        <h4> Edit Assessments </h4>

        <!-- Name and DDL are hard coded, need to be automatically written after connect with other html by using JS. -->
        <h5> Name </h5>
        <select id="assessment_select"></select>

        <!-- <h5> Deadline </h5>
            <input type="date" id="ddl" name="ddl"> -->

        <h5> Progress </h5>
            
            <select id="status_select"> <!-- id for later use in js -->
                <option value="Pending"> Pending </option>
                <option value="Completed"> Completed </option>
            </select>

        <h5> Notes </h5>
            <textarea id="notes" name="notes" rows="4" cols="50">
            </textarea>

        <br>
        <button type="button" class="edit_button save_button"> Save </button>
        <button type="button" class="edit_button cancel_button"> Cancel </button>

        </section>
    </main>

    <footer>
      <nav>
